name: Build AlwaysEnglish

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'recursive'
    
    - name: Install Qt 6.6.3 using Aqtinstall
      shell: cmd
      run: |
        pip install aqtinstall
        aqt install-qt windows desktop 6.6.3 win64_msvc2019_64 --outputdir D:\Qt
    
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
    
    - name: Configure CMake
      shell: cmd
      run: |
        set PATH=D:\Qt\6.6.3\msvc2019_64\bin;%PATH%
        mkdir build
        cd build
        cmake .. -DCMAKE_PREFIX_PATH=D:\Qt\6.6.3\msvc2019_64 -DCMAKE_BUILD_TYPE=Release -GNinja
    
    - name: Build
      shell: cmd
      run: |
        set PATH=D:\Qt\6.6.3\msvc2019_64\bin;%PATH%
        cd build
        ninja
    
    - name: Deploy using CMake target
      shell: cmd
      run: |
        set PATH=D:\Qt\6.6.3\msvc2019_64\bin;%PATH%
        cd build
        ninja Script-DeployRelease
    
    - name: List dist contents
      shell: cmd
      run: |
        echo === Root files ===
        dir dist\*.exe
        dir dist\*.dll
        echo === QML directory ===
        dir dist\qml\
        echo === FluentUI QML ===
        dir dist\qml\FluentUI\
        echo === Plugins ===
        dir dist\plugins\
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: AlwaysEnglish-Win64
        path: dist/