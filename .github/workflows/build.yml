name: Build AlwaysEnglish

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'recursive'
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.6.3'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2019_64'
        modules: 'qtquick qtqml qtshadertools qt5compat qtsvg'
        setup-python: false
    
    - name: Configure CMake
      shell: powershell
      run: |
        New-Item -ItemType Directory -Force -Path build | Out-Null
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release -GNinja
    
    - name: Build
      shell: powershell
      run: |
        cd build
        ninja
    
    - name: Copy Qt dependencies
      shell: powershell
      run: |
        New-Item -ItemType Directory -Force -Path dist | Out-Null
        Copy-Item -Path build/dist/AlwaysEnglish.exe -Destination dist/ -Force
        windeployqt dist/AlwaysEnglish.exe --qmldir=src/qml
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: AlwaysEnglish-Win64
        path: dist/